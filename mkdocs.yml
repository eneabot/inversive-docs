site_name: INVERSIVE DATA BOOK
site_description: Règles Métier v4.0 — Source de vérité de la plateforme Inversive (320+ règles)
site_author: Inversive
docs_dir: docs
site_dir: site

extra_css:
  - stylesheets/databook.css

theme:
  name: material
  language: fr
  palette:
    - scheme: slate
      primary: black
      accent: red
      toggle:
        icon: material/brightness-4
        name: Passer en mode clair
    - scheme: default
      primary: black
      accent: red
      toggle:
        icon: material/brightness-7
        name: Passer en mode sombre
  font:
    text: Exo 2
    code: Share Tech Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.share
    - content.code.copy
    - content.tooltips

plugins:
  - search:
      lang: fr
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: Sur cette page

